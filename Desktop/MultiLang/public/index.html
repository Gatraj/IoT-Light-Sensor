<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600&family=Noto+Sans+Telugu:wght@400;600&family=Noto+Sans+Kannada:wght@400;600&family=Noto+Sans+Gurmukhi:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <header class="sidebar-header">
        <h1 id="appTitle">Nexova</h1>
        <button type="button" class="lang-trigger" id="langTrigger" aria-label="Select language">
          <span class="lang-trigger-icon">🌐</span>
          <span id="currentLangLabel">English</span>
          <span class="lang-chevron">▼</span>
        </button>
        <div class="lang-dropdown" id="langDropdown" hidden>
          <button type="button" data-lang="en">English</button>
          <button type="button" data-lang="fr">Français</button>
          <button type="button" data-lang="hi">हिंदी</button>
          <button type="button" data-lang="mr">मराठी</button>
          <button type="button" data-lang="es">Español</button>
          <button type="button" data-lang="pt">Português</button>
          <button type="button" data-lang="kn">ಕನ್ನಡ</button>
          <button type="button" data-lang="te">తెలుగు</button>
          <button type="button" data-lang="pa">ਪੰਜਾਬੀ</button>
          <button type="button" data-lang="sa">संस्कृतम्</button>
        </div>
      </header>
      <section class="room-section">
        <label for="userName" id="yourNameLabel">Your name</label>
        <input type="text" id="userName" placeholder="Enter your name" maxlength="32" />
        <label for="roomId" id="roomIdLabel">Room ID</label>
        <input type="text" id="roomId" placeholder="Enter room ID to join" />
        <div class="room-actions">
          <button type="button" class="btn btn-primary" id="joinBtn">Join room</button>
          <button type="button" class="btn btn-secondary" id="createBtn">Create room</button>
        </div>
        <div class="recent-rooms" id="recentRooms">
          <div class="recent-rooms-title">Recent rooms</div>
          <div class="recent-rooms-table-wrap">
            <table class="recent-rooms-table" aria-label="Recent rooms">
              <thead>
                <tr>
                  <th>Room ID</th>
                  <th>Last</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="recentRoomsBody"></tbody>
            </table>
          </div>
          <div class="recent-rooms-empty" id="recentRoomsEmpty" hidden>No rooms yet.</div>
        </div>
      </section>
      <div class="sidebar-footer">
        <p class="hint" id="hintJoin">Enter a room ID and your name, then join or create a room.</p>
      </div>
    </aside>
    <main class="chat-main">
      <header class="main-top-bar">
        <div class="main-top-bar-brand">
          <div class="main-top-bar-row1">
            <span class="main-top-bar-icon" aria-hidden="true">
              <svg viewBox="0 0 40 40" class="nexova-logo-icon">
                <defs>
                  <linearGradient id="nexovaIconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#00d4ff" />
                    <stop offset="50%" stop-color="#7c3aed" />
                    <stop offset="100%" stop-color="#ec4899" />
                  </linearGradient>
                  <filter id="nexovaGlow">
                    <feGaussianBlur stdDeviation="1" result="blur" />
                    <feMerge>
                      <feMergeNode in="blur" />
                      <feMergeNode in="SourceGraphic" />
                    </feMerge>
                  </filter>
                </defs>
                <path d="M8 4C5.8 4 4 5.8 4 8v14c0 2.2 1.8 4 4 4h2v6l6-6h14c2.2 0 4-1.8 4-4V8c0-2.2-1.8-4-4-4H8z" fill="none" stroke="url(#nexovaIconGrad)" stroke-width="1.5" stroke-linejoin="round" filter="url(#nexovaGlow)" />
                <circle cx="12" cy="14" r="1.2" fill="#00d4ff" opacity="0.9" />
                <circle cx="20" cy="14" r="1.2" fill="#00d4ff" opacity="0.9" />
                <circle cx="28" cy="14" r="1.2" fill="#00d4ff" opacity="0.9" />
              </svg>
            </span>
            <h2 id="welcomeTitle" class="main-top-bar-title">Nexova</h2>
          </div>
          <div class="main-top-bar-sub">
            <button type="button" class="chat-room-badge" id="chatRoomBadge" aria-haspopup="dialog" aria-expanded="false" title="Room members">
              Room
            </button>
          </div>
        </div>
        <div class="main-top-bar-actions">
          <div class="chat-search-wrap">
            <label for="chatSearchInput" class="chat-search-label">Search messages</label>
            <input
              type="search"
              id="chatSearchInput"
              class="chat-search-input"
              placeholder="Search messages…"
              autocomplete="off"
              enterkeyhint="search"
              aria-label="Search messages in this chat"
            />
            <span class="chat-search-count" id="chatSearchCount" hidden aria-live="polite"></span>
          </div>
          <button type="button" class="settings-btn" id="settingsBtn" aria-label="Settings" title="Settings">⚙</button>
        </div>
      </header>
      <div class="welcome" id="welcome"></div>
      <div class="chat-area" id="chatArea" hidden>
        <div class="messages" id="messages"></div>
        <form class="composer" id="composer">
          <div class="composer-emoji-wrap">
            <button type="button" class="emoji-btn" id="emojiBtn" aria-label="Emoji" title="Emoji">
            <svg class="emoji-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </button>
            <div class="emoji-picker" id="emojiPicker" hidden>
              <div class="emoji-picker-grid" id="emojiPickerGrid"></div>
              <div class="emoji-picker-section-label">Hearts</div>
              <div class="emoji-picker-grid" id="emojiPickerHearts"></div>
              <div class="emoji-picker-section-label">Food &amp; Drink</div>
              <div class="emoji-picker-grid" id="emojiPickerFood"></div>
              <div class="emoji-picker-section-label">Flags</div>
              <div class="emoji-picker-grid emoji-picker-flags" id="emojiPickerFlags"></div>
            </div>
          </div>
          <div class="composer-input-wrap">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" />
            <div class="composer-attach-wrap">
              <button type="button" class="composer-attach-btn" id="attachBtn" aria-label="Attach" title="Attach">
                <svg class="attach-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <div class="attach-menu" id="attachMenu" hidden>
                <label class="attach-menu-option" for="attachMediaInput">
                  <span class="attach-menu-label">Photo &amp; Video</span>
                </label>
                <label class="attach-menu-option" for="attachDocInput">
                  <span class="attach-menu-label">Document</span>
                </label>
                <button type="button" class="attach-menu-option" id="attachLink">
                  <span class="attach-menu-label">Link</span>
                </button>
              </div>
              <div class="attach-link-panel" id="attachLinkPanel" hidden>
                <input type="url" class="attach-link-input" id="attachLinkInput" placeholder="Paste link URL" />
                <button type="button" class="attach-link-add" id="attachLinkAdd">Add</button>
              </div>
              <input type="file" id="attachMediaInput" class="file-input-hidden" accept="image/*,video/*" />
              <input type="file" id="attachDocInput" class="file-input-hidden" accept=".pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx,.rtf,.csv,.jpeg,.jpg,.png,.gif,.webp,image/*,application/pdf" />
            </div>
          </div>
          <button type="submit" class="send-btn" id="sendBtn" aria-label="Send">➤</button>
        </form>
      </div>
    </main>
  </div>
  <div class="room-members-backdrop" id="roomMembersBackdrop" hidden aria-hidden="true">
    <div class="room-members-dialog" role="dialog" aria-modal="true" aria-labelledby="roomMembersTitle" tabindex="-1">
      <header class="room-members-header">
        <h3 class="room-members-title" id="roomMembersTitle">Room members</h3>
        <button type="button" class="room-members-close" id="roomMembersClose" aria-label="Close">✕</button>
      </header>
      <ul class="room-members-list" id="roomMembersList"></ul>
    </div>
  </div>
  <div class="settings-slider-overlay" id="settingsOverlay" aria-hidden="true"></div>
  <aside class="settings-slider" id="settingsSlider" aria-label="Settings panel">
    <header class="settings-slider-header">
      <h3 class="settings-slider-title">Settings</h3>
      <button type="button" class="settings-slider-close" id="settingsClose" aria-label="Close">✕</button>
    </header>
    <nav class="settings-slider-nav">
      <button type="button" class="settings-option" id="settingsProfile">Profile</button>
      <button type="button" class="settings-option" id="settingsTheme">Theme</button>
    </nav>
    <section class="settings-theme-section" id="settingsThemeSection" hidden>
      <h4 class="settings-theme-title">Chat themes</h4>
      <div class="settings-theme-grid">
        <button type="button" class="theme-card" data-theme-key="classic">
          <span class="theme-swatch theme-swatch-classic"></span>
          <span class="theme-card-name">Classic</span>
        </button>
        <button type="button" class="theme-card" data-theme-key="midnight">
          <span class="theme-swatch theme-swatch-midnight"></span>
          <span class="theme-card-name">Midnight</span>
        </button>
        <button type="button" class="theme-card" data-theme-key="ocean">
          <span class="theme-swatch theme-swatch-ocean"></span>
          <span class="theme-card-name">Ocean</span>
        </button>
        <button type="button" class="theme-card" data-theme-key="sunset">
          <span class="theme-swatch theme-swatch-sunset"></span>
          <span class="theme-card-name">Sunset</span>
        </button>
        <button type="button" class="theme-card" data-theme-key="forest">
          <span class="theme-swatch theme-swatch-forest"></span>
          <span class="theme-card-name">Forest</span>
        </button>
        <button type="button" class="theme-card" data-theme-key="amber">
          <span class="theme-swatch theme-swatch-amber"></span>
          <span class="theme-card-name">Amber</span>
        </button>
      </div>
    </section>
    <section class="settings-theme-section" id="settingsWallpaperSection" hidden>
      <h4 class="settings-theme-title">Chat wallpaper</h4>
      <div class="settings-theme-grid">
        <button type="button" class="theme-card wallpaper-card" data-wallpaper-key="scenic">
          <span class="theme-swatch theme-swatch-classic"></span>
          <span class="theme-card-name">Scenic</span>
        </button>
        <button type="button" class="theme-card wallpaper-card" data-wallpaper-key="city">
          <span class="theme-swatch theme-swatch-midnight"></span>
          <span class="theme-card-name">City lights</span>
        </button>
        <button type="button" class="theme-card wallpaper-card" data-wallpaper-key="mountains">
          <span class="theme-swatch theme-swatch-forest"></span>
          <span class="theme-card-name">Mountains</span>
        </button>
        <button type="button" class="theme-card wallpaper-card" data-wallpaper-key="sketch">
          <span class="theme-swatch theme-swatch-ocean"></span>
          <span class="theme-card-name">Sketch</span>
        </button>
        <button type="button" class="theme-card wallpaper-card" data-wallpaper-key="aurora">
          <span class="theme-swatch theme-swatch-sunset"></span>
          <span class="theme-card-name">Aurora</span>
        </button>
      </div>
    </section>
  </aside>
  <aside class="profile-slider" id="profileSlider" aria-label="Profile panel">
    <header class="profile-slider-header">
      <button type="button" class="profile-slider-back" id="profileBack" aria-label="Back">←</button>
      <h3 class="profile-slider-title">Profile</h3>
    </header>
    <div class="profile-slider-content">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profileAvatar">
          <span class="profile-avatar-initials" id="profileInitials">?</span>
        </div>
        <button type="button" class="profile-avatar-edit" id="profileAvatarEdit" aria-label="Change profile photo" title="Change photo">✎</button>
        <input type="file" id="profileAvatarInput" accept="image/*" hidden />
      </div>
      <div class="profile-field">
        <label class="profile-label">Name</label>
        <p class="profile-value" id="profileName">—</p>
      </div>
      <div class="profile-field profile-field-email">
        <div class="profile-email-header">
          <label class="profile-label">Email</label>
          <button type="button" class="profile-edit-btn" id="profileEmailEdit" aria-label="Edit email" title="Edit email">✎</button>
        </div>
        <p class="profile-value profile-email-value" id="profileEmail">—</p>
        <div class="profile-email-edit" id="profileEmailEditRow" aria-hidden="true">
          <input type="email" class="profile-email-input" id="profileEmailInput" placeholder="Enter email" />
          <button type="button" class="profile-email-save" id="profileEmailSave">Save</button>
        </div>
        <button type="button" class="profile-signout-btn" id="profileSignOut">Sign out</button>
      </div>
    </div>
  </aside>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/sanscript.js"></script>
  <script src="app.js"></script>
</body>
</html>
